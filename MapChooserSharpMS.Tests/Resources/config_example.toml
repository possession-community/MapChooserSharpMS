
[MapChooserSharpSettings.Default]
# These are default value for map settings.
# You can modify these section, but do not remove.
MapNameAlias = ""
MapDescription = ""
IsDisabled = false
WorkshopId = 0
OnlyNomination = false
Cooldown = 0
MaxExtends = 3
MaxExtCommandUses = 1
ExtendTimePerExtends = 15
MapTime = 20
ExtendRoundsPerExtends = 5
MapRounds = 10
MaxPlayers = 0
MinPlayers = 0
ProhibitAdminNomination = false
DaysAllowed = []
AllowedTimeRanges = []




# ==============================================================
# Full configuration example
# ==============================================================

# Full configuration
[ze_example_abc]

# ===== Basic Map Settings =====

# If set, it will display this string instead of map name
MapNameAlias = "ze example a b c"

# If set, it will display this string when vote finished, and before map transition
MapDescription = "Let's play ze_example_abc!"

# If set, the map cannot be nominated even if admin
# Default value is disabled
IsDisabled = false

# If set, this map recognized as workshop map
WorkshopId = 1234567891234

# If set, the map will not included in random vote pick
OnlyNomination = false

# Cooldown for this map, specify with hours
Cooldown = 60

# Cooldown time for this map, specify with the datetime suffix
# This will be applied with when normal cooldown applies, but differences is this just requires specified times elapsed.
# You can use, "d" (day), "m" (month), If you don't want to apply it, then leave it blank 
CooldownDateTime = "2d"

# Max extends
MaxExtends = 3

# Max !ext command uses
MaxExtCommandUses = 1

# Extend time per extend (minutes)
ExtendTimePerExtends = 15

# If cycle is round based
# How many rounds extended in per extend?
# ExtendRoundsPerExtends = 5

# ===== Nomination Settings =====

# Max players requires to nominate this map
MaxPlayers = 64

# Minimal players requires to nominate this map
MinPlayers = 10

# Make only server console can nominate this map
ProhibitAdminNomination = false

# If this value(s) are set, the nomination will be restricted to these days.
# Also, if DaysAllowed is set, the check will be combined.
DaysAllowed = ["wednesday", "monday"]

# If this value(s) are set, the nomination will be restricted to these time ranges.
# Also, if DaysAllowed is set, the check will be combined.
AllowedTimeRanges = ["10:00-12:00", "20:00-22:00", "22:00-03:00"]


# Extra configuration for external plugin
[ze_example_abc.extra.shop]
cost = 100


# ==============================================================
# Minimal configuration example
# ==============================================================

# Minimal configuration....... Yes you can define simply!
# This will uses default value from [MapChooserSharpSettings.Default] section
[ze_example_xyz]




# ==============================================================
# Group configuration example
# ==============================================================

# Configuration with groups
# By assigning this group to the map's GroupSettings, the group's setting values can be treated as the map's default settings values.
[MapChooserSharpSettings.Groups.HardZeMap]
# Cooldown is are special value.
Cooldown = 30

# CooldownOverride is group-only setting.
# If set, this value will override the map's Cooldown with higher priority than map config.
# CooldownOverride = 60

OnlyNomination = true
DaysAllowed = ["saturday", "sunday"]
AllowedTimeRanges = ["18:00-00:00"]

# Yes! you can still define extra configuration for external plugin even if in group settings!
[MapChooserSharpSettings.Groups.HardZeMap.extra.shop]
cost = 100


[ze_example_123]
# If this is set, we will use group settings.
# If there is no matched group, it will silently ignored.
GroupSettings = ["HardZeMap"]

# But if we set value in map settings and already defined in group, it will override group settings.
OnlyNomination = false

# But cooldown is individual for map and group. They are tracked separately.
# If ze_example_123 is played, group cooldown (30) applies to all maps in HardZeMap group,
# and map cooldown (60) applies only to ze_example_123 itself.
Cooldown = 60



# ==============================================================
# Adding multiple groups to map group
# ==============================================================

[MapChooserSharpSettings.Groups.Group1]
AllowedTimeRanges = ["18:00-00:00"]
MaxPlayers = 1000
NominationCountLimit = 2


[MapChooserSharpSettings.Groups.Group2]
DaysAllowed = ["saturday", "sunday"]
MinPlayers = 300
NominationCountLimit = 0



[ze_example_789]
# If there are multiple groups and the values of the groups are the same, the value of the first group specified takes precedence.
GroupSettings = ["Group1", "Group2"]



# ==============================================================
# DaySettings (Override) configuration example
# ==============================================================

# DaySettings allows you to override map or group settings based on specific days and time ranges.
# You can define any number of overrides using [<key>.DaySettings.<AnyName>]
# The <AnyName> part is just a label and has no special meaning.
#
# Override priority: Higher OverridePriority value takes precedence.
# TargetDays must always be explicitly specified.


# ----- Map-level DaySettings -----

[ze_example_abc.DaySettings.WeekendNight]
Enabled = true
ForceOverride = false
OverridePriority = 1
TargetDays = ["saturday", "sunday"]
TargetTimeRanges = ["18:00-03:00"]

# These values override the base ze_example_abc settings on saturday/sunday 18:00-03:00
MaxExtends = 5
MinPlayers = 20
OnlyNomination = false

# Extra configuration is also available in DaySettings
[ze_example_abc.DaySettings.WeekendNight.extra.shop]
cost = 50


# Another override for the same map with different schedule
[ze_example_abc.DaySettings.Weekday]
Enabled = true
ForceOverride = false
OverridePriority = 0
TargetDays = ["monday", "tuesday", "wednesday", "thursday", "friday"]

MaxPlayers = 32
MinPlayers = 5


# ----- Group-level DaySettings -----

# Groups can also have DaySettings overrides.
# This override applies to all maps that belong to the HardZeMap group.
[MapChooserSharpSettings.Groups.HardZeMap.DaySettings.WeekendAfternoon]
Enabled = true
ForceOverride = false
OverridePriority = 1
TargetDays = ["saturday", "sunday"]
TargetTimeRanges = ["14:00-18:00"]

OnlyNomination = false
MinPlayers = 10

[MapChooserSharpSettings.Groups.HardZeMap.DaySettings.WeekendAfternoon.extra.shop]
cost = 50